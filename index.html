<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Elite Values</title>
    <style>
        /* FONT IMPORT */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #050505;
            --accent: #00ff88;
            --card-glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            /* BACKGROUND BAGUS: Gradient radial gelap dengan nuansa ungu/biru gaming */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* HEADER & SEARCH */
        .header {
            text-align: center;
            padding: 40px 20px;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00ff88, #00bdff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,255,136,0.2);
        }

        #searchInput {
            width: 90%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #searchInput:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }

        /* GRID & CARDS */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: var(--card-glass);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .item-card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .item-name {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ccc;
            height: 40px;
            overflow: hidden;
        }

        .item-value {
            display: block;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        /* RARITY GLOW EFFECTS */
        .ancient { border-bottom: 4px solid #eb00eb; box-shadow: inset 0 -10px 20px rgba(235,0,235,0.1); }
        .chroma { border-bottom: 4px solid #fff; border-image: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet) 1; }
        .godly { border-bottom: 4px solid #ff3e3e; box-shadow: inset 0 -10px 20px rgba(255,62,62,0.1); }
        .vintage { border-bottom: 4px solid #ffcc00; }

        /* FOOTER */
        .footer {
            padding: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>MM2 VALUES</h1>
        <input type="text" id="searchInput" placeholder="Cari Item..." onkeyup="filterItems()">
    </div>

    <div class="item-grid" id="itemGrid">
        <!-- Item otomatis masuk sini -->
    </div>

    <div class="footer">
        Created for MM2 Traders &copy; 2024
    </div>

    <script>
        const items = [
            // Masukkan data item yang tadi di sini (Saya berikan contoh beberapa)
            { n: "Harvester", v: 3500, r: "ancient", img: "" },
            { n: "Icepiercer", v: 3200, r: "ancient", img: "" },
            { n: "Bat", v: 2800, r: "ancient", img: "" },
            { n: "Chroma Candleflame", v: 4500, r: "chroma", img: "" },
            { n: "Evergun", v: 4500, r: "godly", img: "" },
            { n: "Darksword", v: 650, r: "godly", img: "" },
            { n: "Candy", v: 160, r: "godly", img: "" },
            { n: "Sugar", v: 155, r: "godly", img: "" },
            { n: "Heartblade", v: 75, r: "godly", img: "" },
            { n: "Watergun", v: 220, r: "godly", img: "" },
            { n: "Latte", v: 150, r: "godly", img: "" },
            { n: "America", v: 25, r: "vintage", img: "" }
            // ... Tambahkan list item lainnya dari chat sebelumnya ke sini
        ];

        const grid = document.getElementById('itemGrid');

        function displayItems(data) {
            grid.innerHTML = "";
            data.forEach(item => {
                const card = `
                    <div class="item-card ${item.r}">
                        <img src="${item.img || 'https://via.placeholder.com/100/1a1a1a/ffffff?text=?'}" alt="${item.n}">
                        <span class="item-name">${item.n}</span>
                        <span class="item-value">${item.v.toLocaleString()}</span>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = items.filter(i => i.n.toLowerCase().includes(query));
            displayItems(filtered);
        }

        displayItems(items);
    </script>
</body>
</html>
