<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Trade Calc - Sidebar Edition</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg: #050505;
            --accent: #00ff88;
            --red: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 100%);
            color: white; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 500; border-bottom: 1px solid var(--border);
        }

        .hamburger {
            font-size: 24px; cursor: pointer; color: var(--accent);
            background: none; border: none; padding: 5px;
        }

        #searchInput {
            flex: 1; margin: 0 15px; padding: 10px 15px; border-radius: 20px;
            border: 1px solid #333; background: #111; color: white; outline: none;
        }

        /* ITEM GRID */
        .item-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }
        .item-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .item-card:hover { transform: scale(1.03); background: rgba(255,255,255,0.1); }
        .item-card img { width: 60px; height: 60px; object-fit: contain; }
        .item-name { display: block; font-size: 10px; color: #bbb; height: 25px; margin-top: 5px; }
        .item-val { display: block; font-weight: bold; color: var(--accent); }

        /* SIDEBAR CALCULATOR (DRAWER) */
        .calc-sidebar {
            position: fixed; top: 0; right: -100%; width: 90%; max-width: 350px; height: 100vh;
            background: #0a0a0a; border-left: 2px solid var(--accent);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        .calc-sidebar.active { right: 0; }

        .sidebar-header {
            padding: 20px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }

        /* SIDEBAR BOXES */
        .trade-side {
            background: #111; border-radius: 15px; padding: 15px; margin-bottom: 20px;
            border: 1px solid #222; text-align: center;
        }
        .total-val { font-size: 24px; font-weight: 800; color: var(--accent); }
        .them-val { color: var(--red); }
        
        .list-items { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .mini-item { width: 45px; height: 45px; background: #222; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        .mini-item img { width: 100%; height: 100%; object-fit: contain; }

        .vs-divider { text-align: center; font-weight: 900; font-size: 20px; color: #555; margin: 10px 0; }
        
        .status-badge { display: block; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .win { background: var(--accent); color: black; }
        .loss { background: var(--red); color: white; }
        .fair { background: #333; color: white; }

        /* MODAL */
        #sideModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #151515; padding: 25px; border-radius: 20px; border: 1px solid var(--accent);
            z-index: 2000; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        .btn-side { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-you { background: var(--accent); color: black; }
        .btn-them { background: var(--red); color: white; }

        /* OVERLAY DAFTAR ITEM */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <input type="text" id="searchInput" placeholder="Cari Item..." onkeyup="filterItems()">
        <div style="width: 30px;"></div> <!-- Spacer -->
    </div>

    <div class="item-grid" id="itemGrid"></div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR CALCULATOR -->
    <div class="calc-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 18px; color: var(--accent);">TRADE CALC</h2>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size: 24px; cursor:pointer;">&times;</button>
        </div>
        
        <div class="sidebar-content" id="captureArea">
            <div id="statusBadge" class="status-badge fair">PILIH ITEM</div>

            <!-- SIDE KAMU -->
            <div class="trade-side">
                <div style="font-size: 12px; color: #888;">KAMU</div>
                <div class="total-val" id="totalYou">0</div>
                <div class="list-items" id="listYou"></div>
            </div>

            <div class="vs-divider">VS</div>

            <!-- SIDE LAWAN -->
            <div class="trade-side">
                <div style="font-size: 12px; color: #888;">LAWAN</div>
                <div class="total-val them-val" id="totalThem">0</div>
                <div class="list-items" id="listThem"></div>
            </div>

            <button onclick="takeScreenshot()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--accent); font-weight:bold; cursor:pointer; margin-bottom:10px;">SHARE TRADE (PNG)</button>
            <button onclick="resetTrade()" style="width:100%; padding:10px; border-radius:10px; border:1px solid #444; background:none; color:#888; cursor:pointer;">RESET TRADE</button>
        </div>
    </div>

    <!-- MODAL PILIH SIDE -->
    <div id="sideModal">
        <p id="modalItemName" style="font-size: 18px; font-weight: bold; margin-bottom: 20px;"></p>
        <button class="btn-side btn-you" onclick="addToSide('you')">Side Kamu</button>
        <button class="btn-side btn-them" onclick="addToSide('them')">Side Lawan</button>
        <button onclick="closeModal()" style="background:none; border:none; color:grey; cursor:pointer; margin-top:10px;">Batal</button>
    </div>

    <script>
        const items = [
            { n: "Harvester", v: 3500, r: "ancient", img: "" },
            { n: "Icepiercer", v: 3200, r: "ancient", img: "" },
            { n: "Bat", v: 2800, r: "ancient", img: "" },
            { n: "Evergun", v: 4500, r: "godly", img: "" },
            { n: "Candy", v: 160, r: "godly", img: "" },
            { n: "Sugar", v: 155, r: "godly", img: "" },
            { n: "Heartblade", v: 75, r: "godly", img: "" },
            { n: "Luger", v: 80, r: "godly", img: "" },
            { n: "Darksword", v: 650, r: "godly", img: "" },
            { n: "Ocean", v: 350, r: "godly", img: "" }
        ];

        let trade = { you: [], them: [] };
        let selectedItem = null;

        window.onload = () => {
            const saved = localStorage.getItem('mm2_sidebar_trade');
            if (saved) { trade = JSON.parse(saved); updateCalc(); }
            displayItems(items);
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function displayItems(data) {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = "";
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="item-card" onclick='openModal(${JSON.stringify(item)})'>
                        <img src="${item.img || 'https://via.placeholder.com/60/222/fff?text=?'}" alt="${item.n}">
                        <span class="item-name">${item.n}</span>
                        <span class="item-val">${item.v}</span>
                    </div>
                `;
            });
        }

        function openModal(item) {
            selectedItem = item;
            document.getElementById('modalItemName').innerText = item.n;
            document.getElementById('sideModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('sideModal').style.display = 'none'; }

        function addToSide(side) {
            trade[side].push(selectedItem);
            updateCalc();
            closeModal();
            // Otomatis buka sidebar biar user liat perubahannya
            if(!document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        function updateCalc() {
            let valYou = 0; let valThem = 0;
            const listYou = document.getElementById('listYou');
            const listThem = document.getElementById('listThem');
            
            listYou.innerHTML = ""; listThem.innerHTML = "";

            trade.you.forEach((item, idx) => {
                valYou += item.v;
                listYou.innerHTML += `<div class="mini-item" onclick="removeItem('you', ${idx})"><img src="${item.img || 'https://via.placeholder.com/40'}"></div>`;
            });

            trade.them.forEach((item, idx) => {
                valThem += item.v;
                listThem.innerHTML += `<div class="mini-item" onclick="removeItem('them', ${idx})"><img src="${item.img || 'https://via.placeholder.com/40'}"></div>`;
            });

            document.getElementById('totalYou').innerText = valYou.toLocaleString();
            document.getElementById('totalThem').innerText = valThem.toLocaleString();

            const badge = document.getElementById('statusBadge');
            if (valYou === 0 && valThem === 0) { badge.innerText = "EMPTY"; badge.className = "status-badge fair"; }
            else if (valYou > valThem) { badge.innerText = "L (LOSS)"; badge.className = "status-badge loss"; }
            else if (valThem > valYou) { badge.innerText = "W (PROFIT)"; badge.className = "status-badge win"; }
            else { badge.innerText = "FAIR"; badge.className = "status-badge fair"; }

            localStorage.setItem('mm2_sidebar_trade', JSON.stringify(trade));
        }

        function removeItem(side, index) {
            trade[side].splice(index, 1);
            updateCalc();
        }

        function resetTrade() {
            if(confirm("Reset semua item?")) {
                trade = { you: [], them: [] };
                updateCalc();
            }
        }

        function takeScreenshot() {
            const area = document.getElementById('captureArea');
            html2canvas(area, { backgroundColor: "#0a0a0a" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'trade-mm2.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = items.filter(i => i.n.toLowerCase().includes(query));
            displayItems(filtered);
        }
    </script>
</body>
</html>
